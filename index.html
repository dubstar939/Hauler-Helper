
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hauler Hunter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: 'var(--primary-color, #4f46e5)',
                50: 'var(--primary-50, #f5f3ff)',
                100: 'var(--primary-100, #ede9fe)',
                200: 'var(--primary-200, #ddd6fe)',
                300: 'var(--primary-300, #c4b5fd)',
                400: 'var(--primary-400, #a78bfa)',
                500: 'var(--primary-500, #8b5cf6)',
                600: 'var(--primary-600, #7c3aed)',
                700: 'var(--primary-700, #6d28d9)',
                800: 'var(--primary-800, #5b21b6)',
                900: 'var(--primary-900, #4c1d95)',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary-color: #4f46e5;
      }
      body {
        font-family: var(--font-family, 'Inter'), sans-serif;
      }
      .leaflet-container {
        width: 100%;
        height: 100%;
        border-radius: 1rem;
        z-index: 10;
      }
      /* Quill Editor UI Fixes */
      .ql-toolbar.ql-snow {
        border: none !important;
        background: transparent !important;
        border-bottom: 1px solid #f3f4f6 !important;
        padding: 0.75rem 1.25rem !important;
      }
      .dark .ql-toolbar.ql-snow {
        border-bottom-color: #1f2937 !important;
      }
      .ql-container.ql-snow {
        border: none !important;
        font-family: 'Inter', sans-serif !important;
        font-size: 1rem !important;
      }
      .ql-editor {
        padding: 1.5rem !important;
        min-height: 200px;
      }
      .dark .ql-snow .ql-stroke {
        stroke: #9ca3af !important;
      }
      .dark .ql-snow .ql-fill {
        fill: #9ca3af !important;
      }
      .dark .ql-snow .ql-picker {
        color: #9ca3af !important;
      }
      .dark .ql-editor.ql-blank::before {
        color: #4b5563 !important;
      }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
</head>
  <body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
